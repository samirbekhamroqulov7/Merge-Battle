<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge Battle</title>
    
    <!-- Core CSS -->
    <link rel="stylesheet" href="css/core/reset.css">
    <link rel="stylesheet" href="css/core/variables.css">
    <link rel="stylesheet" href="css/core/typography.css">
    
    <!-- Component CSS -->
    <link rel="stylesheet" href="css/components/grid.css">
    <link rel="stylesheet" href="css/components/inventory.css">
    <link rel="stylesheet" href="css/components/battle.css">
    <link rel="stylesheet" href="css/components/loading.css">
    <link rel="stylesheet" href="css/components/error.css">
    
    <!-- Main CSS -->
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div id="game-container">
        <header class="game-header">
            <h1>Merge Battle</h1>
            <div class="player-info">
                <span>Уровень: <span id="player-level">1</span></span>
                <span>Очки: <span id="player-score">0</span></span>
            </div>
        </header>
        
        <main class="game-main">
            <div id="game-grid" class="game-grid">
                <!-- Grid will be generated by JavaScript -->
            </div>
            
            <div class="inventory-panel">
                <div class="inventory-stats">
                    <div class="stat-item">
                        <div class="stat-label">Предметы</div>
                        <div class="stat-value" id="item-count">0/16</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Уровень</div>
                        <div class="stat-value" id="max-level">1</div>
                    </div>
                </div>
                
                <div class="inventory-controls">
                    <button id="battle-btn" class="control-btn">Битва</button>
                    <button id="save-btn" class="control-btn">Сохранить</button>
                    <button id="load-btn" class="control-btn">Загрузить</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-progress">
            <div id="loading-progress" class="loading-progress-bar"></div>
        </div>
        <div class="loading-text">Загрузка...</div>
    </div>

    <!-- Error Modal -->
    <div id="error-modal" class="error-modal hidden">
        <div class="error-content">
            <h3>Ошибка</h3>
            <p id="error-message"></p>
            <button id="error-reload">Перезагрузить игру</button>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/utils/ErrorHandler.js"></script>
    <script src="js/utils/PerformanceMonitor.js"></script>
    <script src="js/utils/ObjectPool.js"></script>
    <script src="js/systems/MergeSystem.js"></script>
    <script src="js/core/RenderEngine.js"></script>
    <script src="js/core/GameInitializer.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
